<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">CityFix</div>
      <div class="subtitle">Admin Portal</div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
      <div style="text-align:center;margin-top:14px">
        <a href="#" id="resetBtn" style="color:var(--muted);font-size:13px;text-decoration:none;">Forgot password?</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Already logged in?
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().role === "admin") {
          window.location.href = "dashboard.html";
        }
      }
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");
      const btn = document.getElementById("loginBtn");

      errorMsg.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (e) {
        errorMsg.textContent = "Invalid email or password.";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });

    document.getElementById("resetBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      if (!email) { errorMsg.style.color = "var(--progress)"; errorMsg.textContent = "Enter your email first."; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        errorMsg.style.color = "var(--resolved)";
        errorMsg.textContent = "Reset email sent! Check your inbox.";
      } catch (e) {
        errorMsg.style.color = "var(--open)";
        errorMsg.textContent = "Could not send reset email.";
      }
    });

    // Enter key
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
  </script>
</body>
</html>
